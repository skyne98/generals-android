# DXVK config for Android.
#
# DXVK bracket sections are executable-name filters, not component groups.
# Android runs native SDLActivity code as app_process64, so keep global options
# before any section (or they will silently be ignored).

# Defer VkSurfaceKHR creation until the first Present. Generals first probes an
# unsupported D32 device and retries with D16; eager creation leaves the first
# Android ANativeWindow connected and makes the successful retry fail.
d3d9.deferSurfaceCreation = True

# Shader state cache path is supplied by SDL3Main.cpp.
dxvk.enableStateCache = True

# Generals is D3D8 routed through DXVK's D3D9 backend.
d3d9.allowDynamicTextures = True

# Do not let D3D8's legacy DEFAULT interval impose a 60 Hz cadence. Android's
# FIFO compositor still synchronizes presentation to the active 120 Hz mode.
d3d9.presentInterval = 0
